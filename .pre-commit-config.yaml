repos:
  # 基礎 hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  # 密鑰掃描
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # SAST
  - repo: https://github.com/semgrep/semgrep
    rev: v1.75.0
    hooks:
      - id: semgrep
        args: ['--config', 'p/python', '--error']
