name: CI (Incomplete - Phase 1 Audit Target)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # Phase 2 Step 2：在這裡加入你找到的安全步驟
      # 提示：你剛才手動跑了三個工具——怎麼把它們變成 CI 的一部分？
      # ============================================================

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v
